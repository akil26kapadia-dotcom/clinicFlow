openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dental Clinic Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: patients
    description: Patient management
  - name: appointments
    description: Appointment management
  - name: treatments
    description: Treatment management
  - name: invoices
    description: Invoice management
  - name: staff
    description: Staff management
  - name: dashboard
    description: Dashboard statistics
  - name: reports
    description: Reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register clinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetail"
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: date
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /treatments:
    get:
      operationId: listTreatments
      tags: [treatments]
      summary: List treatments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Treatment"
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Create treatment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreatmentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"

  /treatments/{id}:
    put:
      operationId: updateTreatment
      tags: [treatments]
      summary: Update treatment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreatmentRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"
    delete:
      operationId: deleteTreatment
      tags: [treatments]
      summary: Delete treatment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}:
    put:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Delete staff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/revenue-chart:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Get monthly revenue chart data
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /dashboard/appointments-chart:
    get:
      operationId: getAppointmentsChart
      tags: [dashboard]
      summary: Get appointments per day chart data
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /reports/daily-revenue:
    get:
      operationId: getDailyRevenue
      tags: [reports]
      summary: Daily revenue report
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

  /reports/monthly-revenue:
    get:
      operationId: getMonthlyRevenue
      tags: [reports]
      summary: Monthly revenue report
      parameters:
        - name: month
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

  /reports/pending-payments:
    get:
      operationId: getPendingPayments
      tags: [reports]
      summary: Pending payments report
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /reports/top-treatments:
    get:
      operationId: getTopTreatments
      tags: [reports]
      summary: Top treatments report
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TreatmentStat"

  /settings:
    get:
      operationId: getSettings
      tags: [auth]
      summary: Get clinic settings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateSettings
      tags: [auth]
      summary: Update clinic settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        clinicName:
          type: string
        gstNumber:
          type: string
      required:
        - name
        - email
        - password
        - clinicName

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
        clinicName:
          type: string
        gstNumber:
          type: string
        clinicAddress:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string
      required:
        - id
        - name
        - email
        - role
        - clinicName

    UpdateSettingsRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        clinicName:
          type: string
        gstNumber:
          type: string
        clinicAddress:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string

    Patient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        age:
          type: integer
        gender:
          type: string
        medicalHistory:
          type: string
        notes:
          type: string
        firstVisit:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone

    PatientDetail:
      allOf:
        - $ref: "#/components/schemas/Patient"
        - type: object
          properties:
            appointments:
              type: array
              items:
                $ref: "#/components/schemas/Appointment"
            invoices:
              type: array
              items:
                $ref: "#/components/schemas/Invoice"

    CreatePatientRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        age:
          type: integer
        gender:
          type: string
        medicalHistory:
          type: string
        notes:
          type: string
        firstVisit:
          type: string
      required:
        - name
        - phone

    Appointment:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        patientName:
          type: string
        doctor:
          type: string
        date:
          type: string
        time:
          type: string
        treatment:
          type: string
        notes:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - patientId
        - doctor
        - date
        - time
        - status

    CreateAppointmentRequest:
      type: object
      properties:
        patientId:
          type: integer
        doctor:
          type: string
        date:
          type: string
        time:
          type: string
        treatment:
          type: string
        notes:
          type: string
        status:
          type: string
      required:
        - patientId
        - doctor
        - date
        - time

    UpdateAppointmentRequest:
      type: object
      properties:
        patientId:
          type: integer
        doctor:
          type: string
        date:
          type: string
        time:
          type: string
        treatment:
          type: string
        notes:
          type: string
        status:
          type: string

    Treatment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        cost:
          type: number
        duration:
          type: integer
        description:
          type: string
      required:
        - id
        - name
        - cost

    CreateTreatmentRequest:
      type: object
      properties:
        name:
          type: string
        cost:
          type: number
        duration:
          type: integer
        description:
          type: string
      required:
        - name
        - cost

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        patientId:
          type: integer
        patientName:
          type: string
        date:
          type: string
        subtotal:
          type: number
        discount:
          type: number
        gst:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        createdAt:
          type: string
      required:
        - id
        - invoiceNumber
        - patientId
        - date
        - subtotal
        - total
        - paymentStatus

    InvoiceDetail:
      allOf:
        - $ref: "#/components/schemas/Invoice"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/InvoiceItem"

    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        invoiceId:
          type: integer
        treatment:
          type: string
        price:
          type: number
      required:
        - id
        - invoiceId
        - treatment
        - price

    CreateInvoiceRequest:
      type: object
      properties:
        patientId:
          type: integer
        date:
          type: string
        discount:
          type: number
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateInvoiceItem"
      required:
        - patientId
        - items

    CreateInvoiceItem:
      type: object
      properties:
        treatment:
          type: string
        price:
          type: number
      required:
        - treatment
        - price

    UpdateInvoiceRequest:
      type: object
      properties:
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        discount:
          type: number

    Staff:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        phone:
          type: string
        email:
          type: string
        specialization:
          type: string
        joiningDate:
          type: string
        salary:
          type: number
        status:
          type: string
      required:
        - id
        - name
        - role

    CreateStaffRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        phone:
          type: string
        email:
          type: string
        specialization:
          type: string
        joiningDate:
          type: string
        salary:
          type: number
        status:
          type: string
      required:
        - name
        - role

    DashboardStats:
      type: object
      properties:
        todayAppointments:
          type: integer
        totalPatients:
          type: integer
        monthlyRevenue:
          type: number
        pendingPayments:
          type: number
        completedTreatments:
          type: integer
        newPatients:
          type: integer
      required:
        - todayAppointments
        - totalPatients
        - monthlyRevenue
        - pendingPayments
        - completedTreatments
        - newPatients

    ChartDataPoint:
      type: object
      properties:
        label:
          type: string
        value:
          type: number
      required:
        - label
        - value

    RevenueReport:
      type: object
      properties:
        totalRevenue:
          type: number
        totalInvoices:
          type: integer
        paidAmount:
          type: number
        pendingAmount:
          type: number
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
      required:
        - totalRevenue
        - totalInvoices
        - paidAmount
        - pendingAmount

    TreatmentStat:
      type: object
      properties:
        treatment:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required:
        - treatment
        - count
        - revenue
