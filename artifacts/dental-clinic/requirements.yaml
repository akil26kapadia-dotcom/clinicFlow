packages:
  "recharts": "For beautiful dashboard analytics charts"
  "date-fns": "For date formatting and calendar calculations"
  "framer-motion": "For page transitions, modal animations, and micro-interactions"
  "react-hook-form": "For form state management"
  "@hookform/resolvers": "For Zod form validation integration"
  "zod": "For client-side form schema validation"
  "clsx": "Utility for constructing className strings conditionally"
