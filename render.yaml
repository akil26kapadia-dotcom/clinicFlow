databases:
  - name: clinic-flow-db
    databaseName: clinicflow
    user: clinicflow
    plan: free

services:
  # ── API Server (Node / Express) ─────────────────────────────────────────────
  - type: web
    name: clinic-flow-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: PNPM_VERSION
        value: 10.3.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-flow-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # Set this manually after the frontend URL is known

  # ── Frontend (React / Vite — Static Site) ───────────────────────────────────
  - type: web
    name: clinic-flow-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/dental-clinic run build
    staticPublishPath: ./artifacts/dental-clinic/dist/public
    envVars:
      - key: PNPM_VERSION
        value: 10.3.0
      - key: VITE_API_URL
        sync: false   # Set this to your clinic-flow-api URL after API deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
